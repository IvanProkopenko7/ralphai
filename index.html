<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RalphAI — Free Ralph Lauren Legit Check</title>
  <meta name="description"
    content="Free Ralph Lauren legit check powered by AI. Upload a photo of your label to instantly verify if your Polo shirt is authentic or a fake." />
  <meta property="og:title" content="RalphAI — Ralph Lauren Legit Check | Free AI Checker" />
  <meta property="og:description" content="Free AI-powered legit check for Ralph Lauren clothing. Upload a photo of the label to instantly find out if it's authentic or fake." />
  <meta property="og:url" content="https://ralphai.tech" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://ralphai.tech/og-image.png?v=2" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="RalphAI — Ralph Lauren Legit Check | Free AI Checker" />
  <meta name="twitter:description" content="Free AI-powered legit check for Ralph Lauren clothing. Upload a photo of the label to instantly find out if it's authentic or fake." />
  <meta name="twitter:image" content="https://ralphai.tech/og-image.png?v=2" />
  <link rel="canonical" href="https://ralphai.tech/" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "RalphAI",
    "url": "https://ralphai.tech",
    "description": "AI-powered legit check tool for Ralph Lauren labels. Instantly detect authentic vs fake.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
</head>

<body>

  <header class="navbar">
    <a href="javascript:void(0)" class="nav-logo" onclick="location.reload()">RALPHAI</a>
    <nav class="nav-links">
      <a href="#" class="nav-ankieta" data-i18n="navSurvey">ANKIETA</a>
      <a href="mailto:contact@ralphai.tech" class="nav-kontakt" data-i18n="navContact" id="navContactLink">KONTAKT</a>
      <button id="langToggle" class="nav-lang-toggle"></button>
    </nav>
  </header>

  <main id="canvas" class="main-content">

    <!-- Upload section -->
    <section class="upload-section">
      <p class="title">Legit check RALPH LAUREN</p>
      <p class="subtitle" data-i18n="subtitle">Dodaj zdjęcie górnej metki</p>
      <p class="note">
        <span data-i18n="notePrefix">*Na razie obsługiwane są tylko metki</span><span class="note-bold"
          data-i18n="noteBold"> „Polo by Ralph Lauren"</span>
      </p>

      <input type="file" id="fileInput" accept="image/*" multiple hidden />

      <div class="preview-clearAll-container" id="previewClearAllContainer" hidden>
        <button id="previewClearAll" class="preview-clearAll" data-i18n="clearAll">Wyczyść wszystko</button>
      </div>
      <div id="previewGrid" class="preview-grid" hidden></div>

      <div id="resultRow" class="result-row" hidden></div>

      <button id="chooseBtn" class="choose-btn">
        <span data-i18n="chooseBtn">Wybierz zdjęcie</span>
      </button>

      <div class="drop-text" id="dropTextGroup">
        <p class="drop-line-1" data-i18n="dropLine1">lub upuść zdjęcia tutaj</p>
        <p class="drop-line-2" data-i18n="dropLine2">albo wklej z Ctrl+V</p>
      </div>

      <button id="btnAnalyze" class="btn-analyze" hidden><span>Sprawdź metkę</span></button>
      <div id="errorMsg" class="error-msg" hidden></div>
    </section>

    <!-- How-to section -->
    <section class="how-to-section">
      <p class="section-heading" data-i18n="howTo">Jak kadrować zdjęcia?</p>
      <video class="cropping-video" autoplay loop muted playsinline>
        <source src="polo_by_cropping.mp4" type="video/mp4" />
      </video>
    </section>

  </main>

  <!-- Ankieta modal -->
  <div class="ankieta-overlay" id="ankietaModal" hidden>
    <div class="ankieta-modal-inner">
      <button class="ankieta-close" id="btnAnkietaClose">&#x2715;</button>
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLScLEdyzmpLAqRDd0vL2WiuSM8GGE1uLsfMoMIa9NQ_cxvBEew/viewform?embedded=true"
        data-src-en="https://docs.google.com/forms/d/e/1FAIpQLSekwho11Sn0HfgCnvqzYGK_4JIGGqRmLeunpvy6pGK0v0FiTw/viewform?embedded=true"
        frameborder="0" scrolling="yes">Loading…</iframe>
    </div>
  </div>

  <!-- Cropper modal -->
  <div class="cropper-overlay" id="cropperModal" hidden>
    <div class="cropper-modal-inner">
      <div class="cropper-img-wrap">
        <img id="cropperImg" src="" alt="Kadruj zdjęcie" />
      </div>
      <div class="cropper-actions">
        <button class="btn-crop-cancel" id="btnCropCancel" data-i18n="cropCancel">Anuluj</button>
        <button class="btn-crop-confirm" id="btnCropConfirm" data-i18n="cropConfirm">Przytnij i użyj</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p class="footer-author"><span data-i18n="footerCreatedBy">Stworzone przez</span> <strong>Ivan Prokopenko</strong>
    </p>
    <p class="footer-email">email: <a href="mailto:contact@ralphai.tech" id="footerEmailLink">contact@ralphai.tech</a>
    </p>
    <a href="https://github.com/IvanProkopenko7/ralphai" class="footer-github" target="_blank" rel="noopener">github</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
